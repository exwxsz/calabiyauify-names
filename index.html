<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>卡拉彼丘程度计算器喵~</title>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<style>
*{
  box-sizing:border-box;
  font-family: "Segoe UI","PingFang SC",sans-serif;
}
/* 整个页面居中 */
body {
  margin: 0;
  padding: 0;
  font-family: "Segoe UI", "PingFang SC", sans-serif;
  background: linear-gradient(135deg, #fdfbff, #e6f0ff);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* 外层容器 */
.container {
  width: 90%;
  max-width: 420px;
  background: white;
  border-radius: 24px;
  padding: 40px 30px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
  text-align: center;
  box-sizing: border-box;
  transition: 0.3s ease;
}

/* 标题行 */
.title-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

/* 标题图片 */
.title-img {
  width: 40px;
  height: 40px;
  object-fit: contain;
}

/* 标题 */
.title {
  font-size: 22px;
  font-weight: 700;
  color: #333;
}

/* 副标题 */
.subtitle {
  font-size: 14px;
  color: #666;
  margin-bottom: 25px;
}

/* 输入框 */
input {
  width: 100%;
  padding: 12px 15px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 14px;
  outline: none;
  transition: 0.2s ease;
  box-sizing: border-box;
}

input:focus {
  border-color: #7aa7ff;
  box-shadow: 0 0 0 3px rgba(122, 167, 255, 0.2);
}

/* 按钮 */
button {
  width: 100%;
  margin-top: 18px;
  padding: 12px;
  border-radius: 14px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  background: linear-gradient(135deg, #7aa7ff, #a77bff);
  color: white;
  cursor: pointer;
  transition: all 0.2s ease;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(122, 167, 255, 0.4);
}

button:active {
  transform: scale(0.98);
}

/* 结果区域 */
.result {
  margin-top: 30px;
  animation: fadeIn 0.5s ease;
}

/* 分数 */
.score {
  font-size: 36px;
  font-weight: bold;
  color: #7aa7ff;
}

/* 评论 */
.comment {
  margin-top: 10px;
  font-size: 15px;
  color: #444;
}

/* 猫表情 */
.cat {
  margin-top: 12px;
  font-size: 32px;
}

/* 动画 */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 响应式优化 */
@media (max-width: 480px) {
  .container {
    padding: 30px 20px;
  }

  .title {
    font-size: 18px;
  }

  .score {
    font-size: 30px;
  }
}

.meow{
  position:fixed;
  transform:translate(-50%,-50%);
  font-size:22px;
  font-weight:bold;
  color:#ff6fa5;
  pointer-events:none;
  user-select:none;
  animation: meowPop 0.9s cubic-bezier(.2,.8,.2,1) forwards;
}

@keyframes meowPop{
  0%{
    transform:translate(-50%,-20%) scale(0.3);
    opacity:0;
  }
  20%{
    transform:translate(-50%,-60%) scale(1.3);
    opacity:1;
  }
  100%{
    transform:translate(-50%,-140%) scale(0.8);
    opacity:0;
  }
}

</style>
</head>

<body>
<div id="app">
  <div class="container" @click="spawnMeow">
    
    <div class="title-row">
      <img src="5.png" class="title-img" />
      <div class="title">卡拉彼丘程度计算器喵~</div>
    </div>

    <div class="subtitle">
      输入昵称，检测你的猫娘同步率！
    </div>

    <input v-model="name" placeholder="请输入你的昵称喵~" />

    <button @click="calculate">
      开始计算卡拉彼丘程度喵！
    </button>

    <div class="result" v-if="score!==null">
      <div class="score">{{score}}%</div>
      <div class="comment">{{comment}}</div>
      <img v-bind:src="pic">
    </div>
    <div
      v-for="m in meows"
      :key="m.id"
      class="meow"
      :style="{left:m.x+'px',top:m.y+'px'}"
    >
      喵~
    </div>
  </div>


</div>

<script>
const { createApp } = Vue

createApp({
  data(){
    return{
      name:"",
      score:null,
      comment:"",
      pic:"",
      meows:[]
    }
  },

  methods:{
    spawnMeow(e){

      const id = Date.now() + Math.random()

      this.meows.push({
        id:id,
        x:e.clientX,
        y:e.clientY
      })

      setTimeout(()=>{
        this.meows =
          this.meows.filter(m=>m.id!==id)
      },900)
    },
    calculate(){

      if(!this.name){
        alert("请输入昵称喵！");
        return;
      }

      const name = this.name.trim().toLowerCase();

      /* =========================
        ① 卡拉彼丘强制100%检测
        ========================= */

      // 卡丘文化关键词
      const kqKeywords = [
        "卡丘","卡拉彼丘","超弦","弦化",
        "喵","猫娘","猫猫","kcalabiyau",
        "celestia","strinova"
      ];

      // 卡拉彼丘角色名（可自行扩展）
      const characterNames = [
        "明","信","白墨","星绘","心夏","香奈美",
        "米雪儿","米雪儿李","伊薇特","奥黛丽",
        "玛德蕾娜","拉薇","令","糖猫","千代",
        "忧雾","蕾欧娜","艾卡","芙拉薇娅",
        "绯莎","汐","玛拉","珐格兰丝","加拉蒂亚"
      ];

      const allKeywords = [...kqKeywords, ...characterNames];

      // 命中关键词直接100%
      for(const key of allKeywords){
        if(name.includes(key.toLowerCase())){
          this.score = 100;
          this.comment = "检测到强烈卡丘共振！你就是超弦体本体喵！！";
          this.pic="/6.png";
          this.playVoice();
          this.spawnDanmaku("喵！");
          return;
        }
      }


      /* =========================
        ② 多重哈希计算（核心）
        ========================= */

      let hash1 = 0;
      let hash2 = 1;
      let hash3 = 7;

      for(let i=0;i<name.length;i++){
        const code = name.charCodeAt(i);

        // 基础累加
        hash1 += code * (i + 3);

        // 位运算扰动
        hash2 ^= (code << (i % 8));

        // 乘法扩散
        hash3 = (hash3 * 31 + code) % 100000;
      }

      /* =========================
        ③ 昵称特征加权
        ========================= */

      let bonus = 0;

      // 长度加权
      if(name.length <= 2) bonus += 8;
      else if(name.length >= 6) bonus += 12;

      // 含数字（中二度提升）
      if(/\d/.test(name)) bonus += 6;

      // 含英文（异界感）
      if(/[a-z]/.test(name)) bonus += 5;

      // 重复字符检测（猫化倾向）
      const unique = new Set(name);
      const repeatRate = 1 - unique.size / name.length;
      bonus += Math.floor(repeatRate * 20);

      // 含可爱符号
      if(/[~!@#$%^&*()_+=]/.test(name)) bonus += 10;


      /* =========================
        ④ 混合最终得分
        ========================= */

      let score =
        (hash1 * 3 +
        hash2 * 5 +
        hash3 +
        bonus * 11) % 101;

      if(score < 0) score += 101;

      this.score = score;


      /* =========================
        ⑤ 等级判定
        ========================= */

      if(score < 20){
        this.comment="人类浓度过高…尚未弦化喵。";
        this.emoji="🐾";
      }
      else if(score < 40){
        this.comment="开始进入卡丘世界，耳朵要长出来了喵~";
        this.pic="/1.png";
      }
      else if(score < 60){
        this.comment="喵化进程 50%！正在同步超弦信号！";
        this.pic="/2.png";
      }
      else if(score < 85){
        this.comment="高浓度卡拉彼丘适配者！猫娘指数爆表！";
        this.pic="/3.png";
      }
      else{
        this.comment="完全弦化成功！欢迎加入卡丘世界喵！！";
        this.pic="/4.png";
      }


      /* =========================
        ⑥ 触发效果
        ========================= */

      this.playVoice();
      this.spawnDanmaku("喵~");
    }
  }
}).mount("#app")
</script>
</body>
</html>
